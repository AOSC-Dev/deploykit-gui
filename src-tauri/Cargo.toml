[package]
name = "deploykit-gui"
version = "0.1.0"
description = "Deploykit GUI frontend"
authors = ["you"]
license = "MIT"
repository = ""
edition = "2021"

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib", "lib"]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[build-dependencies]
tauri-build = { version = "2.0.0-beta.8", features = [] }

[dependencies]
tauri = { version = "2.0.0-beta.10", features = [] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
zbus = { version = "4.0", features = ["tokio"] }
tokio = { version = "1.35", features = ["rt-multi-thread"] }
eyre = "0.6"
nom = "7"
url = "2.5"
reqwest = { version = "0.11", features = ["json"] }
thiserror = "1.0"
libc = "0.2"
sha2 = "0.10"
hex = "0.4"
futures = "0.3"
rand = "0.8"
axum = "0.7.4"
tower-http = { version = "0.5.2", features = ["fs", "cors"] }
tauri-plugin-shell = "2.0.0-beta.2"
tauri-plugin-dialog = "2.0.0-beta.2"
tauri-plugin-cli = "2.0.0-beta.2"

[features]
# this feature is used for production builds or when `devPath` points to the filesystem
# DO NOT REMOVE!!
custom-protocol = ["tauri/custom-protocol"]
